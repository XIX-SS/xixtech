<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIXTech | Tutoriais</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {--bg-color: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; --cyan: #06b6d4; --purple: #8b5cf6; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);}
        body {background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; line-height: 1.6;}
        .container {max-width: 1200px; margin: 0 auto; padding: 0 2rem;}
        .text-gradient {background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        
        header {padding: 1.5rem 0; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 100;}
        nav {display: flex; justify-content: space-between; align-items: center;}
        .logo {font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; text-decoration: none; color: white;}
        .nav-links a {margin-left: 2.5rem; text-decoration: none; color: var(--text-muted); font-weight: 500; transition: 0.3s;}
        .nav-links a:hover {color: var(--cyan);}

        .hero {padding: 5rem 0; text-align: center;}
        .hero h1 {font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin: 0; letter-spacing: -2px;}
        
        section {padding: 2rem 0;}
        .grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;}
        
        .card {background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; overflow: hidden; transition: 0.4s; text-decoration: none; color: inherit; display: block;}
        .card:hover {transform: translateY(-10px); border-color: var(--cyan); background: rgba(255, 255, 255, 0.05);}
        
        .card-image {height: 220px; background: #1e293b; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;}
        .card-image i {font-size: 3rem; color: var(--cyan); opacity: 0.5;}
        
        .card-content {padding: 2rem;}
        .card-content h3 {margin: 0 0 1rem 0; font-size: 1.4rem; font-family: 'Space Grotesk', sans-serif;}
        .card-content p {color: var(--text-muted); margin: 0; font-size: 0.95rem;}
